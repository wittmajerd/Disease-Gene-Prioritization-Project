seed: 42

# ── Smoke test for KG-completion mode ───────────────────────────────
# Small model, 3 epochs, just to verify the "all" split path works.

graph:
  data_path: "ogbl_biokg_raw.pkl"

  node_types:
    - "disease"
    - "protein"

  edge_types:
    - ["disease", "disease-protein", "protein"]
    - ["protein", "protein-protein_binding", "protein"]
    - ["protein", "protein-protein_catalysis", "protein"]
    - ["protein", "protein-protein_activation", "protein"]
    - ["protein", "protein-protein_expression", "protein"]
    - ["protein", "protein-protein_inhibition", "protein"]
    - ["protein", "protein-protein_ptmod", "protein"]
    - ["protein", "protein-protein_reaction", "protein"]

  add_reverse_edges: true
  target_edge: ["disease", "disease-protein", "protein"]

split:
  train_ratio: 0.8
  val_ratio: 0.1
  mode: "all"                                 # <── KG completion

model:
  encoder_type: "sage"
  hidden_dim: 64
  num_layers: 2
  output_dim: 64
  heads: 2
  dropout: 0.0
  decoder_type: "distmult"

node2vec:
  enabled: false

training:
  lr: 0.001
  weight_decay: 0.0
  epochs: 3
  patience: 10
  eval_every: 1
  neg_ratio: 8
  neg_sampling: "uniform"
  adversarial_temperature: 1.0
  adversarial_candidates_multiplier: 4
  primary_metric: "f1"
  compute_ranking_on_test: true
  ranking_k_values: [1, 3, 10]
  max_ranking_queries: 50

  # KG-completion settings
  loss_fn: "self_adversarial"
  corruption_mode: "both"
  margin: 6.0
  infonce_temperature: 0.07
  max_val_ranking_queries: 50
  kg_batch_size: 8192

logging:
  use_wandb: false
  wandb_project: "disease-gene-prioritization"
  run_name: "smoke_test_kg"
