seed: 42

graph:
  data_path: "ogbl_biokg_raw.pkl"
  node_types: ["disease", "protein"]          # bővíthető: ["disease", "protein", "drug", "function"]
  edge_types:                                  # melyik él-típusokat vegyük be
    - ["disease", "disease-protein", "protein"]
    - ["protein", "protein-protein_binding", "protein"]
    - ["protein", "protein-protein_catalysis", "protein"]
    # ... bármit hozzáadsz/elveszel
  add_reverse_edges: true
  target_edge: ["disease", "disease_protein", "protein"]  # ezen mérünk

split:
  train_ratio: 0.8
  val_ratio: 0.1

model:
  encoder_type: "sage"       # sage | gat | gcn | transformer | hgt
  hidden_dim: 256
  num_layers: 3
  output_dim: 128
  heads: 4
  dropout: 0.0
  decoder_type: "dot_product"  # dot_product | mlp | distmult

training:
  lr: 0.001
  weight_decay: 0.01
  epochs: 200
  patience: 10
  eval_every: 1
  neg_ratio: 1.0

logging:
  use_wandb: false
  project: "disease-gene-prioritization"
  run_name: null