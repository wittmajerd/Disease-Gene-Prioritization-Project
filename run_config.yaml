seed: 42

# ── Graph construction ──────────────────────────────────────────────
graph:
  data_path: "ogbl_biokg_raw.pkl"             # pickle path (relative to project root)

  # Which node types to include in the heterogeneous graph
  node_types:
    - "disease"
    - "protein"
    # - "drug"
    # - "function"
    # - "sideeffect"

  # Which edge types to include  [src_type, relation, dst_type]
  edge_types:
    - ["disease", "disease-protein", "protein"]
    - ["protein", "protein-protein_binding", "protein"]
    - ["protein", "protein-protein_catalysis", "protein"]
    - ["protein", "protein-protein_activation", "protein"]
    - ["protein", "protein-protein_expression", "protein"]
    - ["protein", "protein-protein_inhibition", "protein"]
    - ["protein", "protein-protein_ptmod", "protein"]
    - ["protein", "protein-protein_reaction", "protein"]
    # - ["drug", "drug-protein", "protein"]
    # - ["drug", "drug-disease", "disease"]
    # - ["protein", "protein-function", "function"]

  add_reverse_edges: true                     # auto-add reverse for every edge type

  # The edge type we want to predict (must be in edge_types above)
  target_edge: ["disease", "disease-protein", "protein"]

# ── Train / val / test split ────────────────────────────────────────
split:
  train_ratio: 0.8
  val_ratio: 0.1
  # test_ratio is inferred: 1 - train - val

# ── Model architecture ──────────────────────────────────────────────
model:
  encoder_type: "sage"                        # sage | gat | gcn | transformer | hgt
  hidden_dim: 256
  num_layers: 3
  output_dim: 128
  heads: 4                                    # only used by gat / transformer / hgt
  dropout: 0.0
  decoder_type: "dot_product"                 # dot_product | mlp | distmult

# ── Node2Vec pre-trained features (optional) ────────────────────────
node2vec:
  enabled: false
  use_full_graph: false                        # true = train on ALL BioKG nodes/edges, then slice
  embedding_dim: 128                          # must match model.hidden_dim (layer_sizes[0])
  walk_length: 20
  context_size: 10
  walks_per_node: 10
  p: 1.0
  q: 1.0
  epochs: 20
  batch_size: 256
  lr: 0.01

# ── Training hyper-parameters ───────────────────────────────────────
training:
  lr: 0.001
  weight_decay: 0.01
  epochs: 200
  patience: 10
  eval_every: 5
  neg_ratio: 1.0                              # #negatives / #positives per batch
  primary_metric: "f1"                        # metric for early stopping & best model

# ── Logging & output ────────────────────────────────────────────────
logging:
  use_wandb: false
  wandb_project: "disease-gene-prioritization"
  run_name: null                              # null → auto timestamp